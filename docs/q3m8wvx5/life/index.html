<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生活改善 — 虎の巻</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .hero { background: linear-gradient(135deg, #064e3b 0%, #065f46 60%, #059669 100%); color: #fff; padding: 3.5rem 3rem 3rem; position: relative; overflow: hidden; }
    .hero::before { content:''; position:absolute; top:-60px; right:-60px; width:280px; height:280px; border-radius:50%; background:rgba(255,255,255,.04); }
    .hero::after  { content:''; position:absolute; bottom:-80px; left:10%; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,.03); }
    .hero-label { font-size:.75rem; letter-spacing:.15em; text-transform:uppercase; color:#6ee7b7; margin-bottom:.6rem; }
    .hero h1 { font-size:2.2rem; font-weight:700; line-height:1.3; margin-bottom:.8rem; }
    .hero h1 span { color:#a7f3d0; }
    .hero-desc { font-size:.95rem; color:#d1fae5; max-width:560px; line-height:1.8; }
    .hero-tags { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:1.25rem; }
    .hero-tag { background:rgba(255,255,255,.1); color:#ecfdf5; border:1px solid rgba(255,255,255,.2); border-radius:999px; padding:.2rem .75rem; font-size:.78rem; }
  </style>
</head>
<body>
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar-placeholder"></aside>

  <!-- MAIN -->
  <main class="main">
    <!-- HERO -->
    <div class="hero">
      <div class="hero-label">Life Improvement Handbook</div>
      <h1>生活改善<span>虎の巻</span></h1>
      <p class="hero-desc">健康・習慣・仕事のパフォーマンス向上に関する書籍まとめ・実践ガイドを集めた資料集です。</p>
      <div class="hero-tags">
        <span class="hero-tag">健康習慣</span>
        <span class="hero-tag">運動</span>
        <span class="hero-tag">睡眠</span>
        <span class="hero-tag">メンタル</span>
        <span class="hero-tag">仕事効率化</span>
        <span class="hero-tag">書籍まとめ</span>
      </div>
    </div>

    <div class="content">

      <!-- 書籍まとめ -->
      <h2 class="section-title"><span class="title-icon">📚</span> 書籍まとめ</h2>
      <div class="phase-grid">
        <a href="healthy-habits.html" class="phase-card bg-phase2">
          <span class="phase-icon">🏃</span>
          <div class="phase-number">書籍まとめ</div>
          <h3>体を動かす習慣・休める習慣</h3>
          <div class="phase-meta">1週間に1つずつ試せる52の習慣 / 運動・休息・パフォーマンス向上</div>
        </a>
      </div>

    </div><!-- /content -->
  </main>
</div>

<script src="js/main.js"></script>
<script src="sidebar.js"></script>
</body>
</html>
