<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>未確認事項・宿題管理ツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
header { background: #2c3e50; color: #fff; padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
header h1 { font-size: 16px; }
header button { padding: 5px 12px; border: 1px solid #fff; background: transparent; color: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
header button:hover { background: rgba(255,255,255,0.15); }
.workspace { display: flex; flex: 1; overflow: hidden; }
.pane-form { width: 360px; background: #fff; border-right: 1px solid #ddd; padding: 14px; overflow-y: auto; flex-shrink: 0; }
.pane-main { flex: 1; overflow-y: auto; padding: 14px; }
h2 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin: 14px 0 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
h2:first-child { margin-top: 0; }
label { font-size: 12px; color: #666; display: block; margin-bottom: 3px; }
input, select, textarea { border: 1px solid #ccc; border-radius: 4px; padding: 7px 10px; font-size: 13px; width: 100%; margin-bottom: 8px; font-family: sans-serif; }
textarea { resize: vertical; }
.btn { padding: 8px 16px; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; font-weight: bold; }
.btn-primary { background: #4a90e2; color: #fff; width: 100%; }
.btn-primary:hover { background: #357abd; }
.btn-sm { background: #ecf0f1; border: 1px solid #ccc; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
.btn-sm:hover { background: #dce1e7; }
/* Status */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
.open { background: #fee2e2; color: #991b1b; }
.checking { background: #fff3cd; color: #856404; }
.resolved { background: #d4edda; color: #155724; }
/* Meeting group */
.meeting-group { margin-bottom: 20px; }
.meeting-header { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #2c3e50; color: #fff; border-radius: 6px 6px 0 0; font-size: 13px; cursor: pointer; }
.meeting-header .toggle-icon { margin-left: auto; font-size: 12px; }
.meeting-body { border: 1px solid #ddd; border-top: none; border-radius: 0 0 6px 6px; background: #fff; }
/* Issue card */
.issue-card { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; display: flex; gap: 10px; }
.issue-card:last-child { border-bottom: none; }
.issue-main { flex: 1; }
.issue-no { font-size: 11px; color: #aaa; margin-bottom: 2px; }
.issue-title { font-size: 14px; font-weight: bold; color: #222; margin-bottom: 4px; }
.issue-desc { font-size: 12px; color: #666; margin-bottom: 6px; white-space: pre-wrap; }
.issue-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; font-size: 11px; color: #888; }
.issue-resolution { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 4px; padding: 7px 10px; margin-top: 6px; font-size: 12px; color: #166534; }
.issue-actions { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; flex-shrink: 0; }
.filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-bar select, .filter-bar input { width: auto; margin-bottom: 0; font-size: 12px; padding: 5px 8px; }
.filter-bar input { flex: 1; min-width: 150px; }
.summary-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.summary-card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 8px 14px; text-align: center; min-width: 80px; }
.summary-card .num { font-size: 20px; font-weight: bold; }
.summary-card .lbl { font-size: 11px; color: #888; }
.priority-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; margin-top: 3px; }
.p-high { background: #e74c3c; }
.p-mid { background: #f39c12; }
.p-low { background: #27ae60; }
</style>
</head>
<body>
<header>
  <h1>未確認事項・宿題管理ツール</h1>
  <button onclick="exportMarkdown()">議事録エクスポート</button>
  <button onclick="loadSample()">サンプル</button>
  <button onclick="exportJSON()" style="border-color:#a0c4ff">💾 保存</button>
  <button onclick="importJSON()">📂 読み込み</button>
</header>
<div class="workspace">
  <div class="pane-form">
    <h2 id="form-title">課題を追加</h2>
    <input type="hidden" id="edit-id" value="">

    <label>ミーティング名・日付</label>
    <input type="text" id="f-meeting" placeholder="例: 2024-01-15 第1回ヒアリング">

    <label>タイトル（何が未確認か）</label>
    <input type="text" id="f-title" placeholder="例: アカウントロックの回数">

    <label>詳細・背景</label>
    <textarea id="f-desc" rows="3" placeholder="例: ログイン失敗が続いた場合に何回でロックするか未定。顧客に確認が必要。"></textarea>

    <label>確認先・担当者</label>
    <input type="text" id="f-owner" placeholder="例: 顧客（田中様）、営業部 山田さん">

    <label>期限</label>
    <input type="date" id="f-deadline">

    <label>優先度</label>
    <select id="f-priority">
      <option value="high">高（次回ヒアリングまでに必須）</option>
      <option value="mid" selected>中（設計着手前に必要）</option>
      <option value="low">低（開発前に確認できればよい）</option>
    </select>

    <label>ステータス</label>
    <select id="f-status">
      <option value="open">未対応</option>
      <option value="checking">確認中</option>
      <option value="resolved">解決済</option>
    </select>

    <div id="resolution-area" style="display:none">
      <label>解決内容・決定事項</label>
      <textarea id="f-resolution" rows="3" placeholder="例: 5回連続失敗でロックすることに決定（2024-01-20 顧客確認済）"></textarea>
    </div>

    <button class="btn btn-primary" style="margin-top:4px" onclick="saveIssue()">保存</button>
    <button class="btn-sm" style="margin-top:8px;width:100%;text-align:center" onclick="cancelEdit()">キャンセル</button>
  </div>

  <div class="pane-main">
    <div class="summary-row" id="summary-row"></div>
    <div class="filter-bar">
      <input type="text" id="search" placeholder="キーワード検索..." oninput="renderList()">
      <select id="filter-status" onchange="renderList()">
        <option value="">すべてのステータス</option>
        <option value="open">未対応</option>
        <option value="checking">確認中</option>
        <option value="resolved">解決済</option>
      </select>
      <select id="filter-priority" onchange="renderList()">
        <option value="">すべての優先度</option>
        <option value="high">高</option>
        <option value="mid">中</option>
        <option value="low">低</option>
      </select>
    </div>
    <div id="issue-list"></div>
  </div>
</div>
<script>
const STORAGE_KEY = 'open-issues-v1';
const STATUS_LABELS = { open: '未対応', checking: '確認中', resolved: '解決済' };
const PRIORITY_LABELS = { high: '高', mid: '中', low: '低' };

function load() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
function save(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function nextId() { const d = load(); return d.length ? Math.max(...d.map(i => i.id)) + 1 : 1; }

document.getElementById('f-status').addEventListener('change', function() {
  document.getElementById('resolution-area').style.display = this.value === 'resolved' ? '' : 'none';
});

function saveIssue() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('タイトルは必須です'); return; }
  const entry = {
    meeting: document.getElementById('f-meeting').value.trim(),
    title,
    desc: document.getElementById('f-desc').value.trim(),
    owner: document.getElementById('f-owner').value.trim(),
    deadline: document.getElementById('f-deadline').value,
    priority: document.getElementById('f-priority').value,
    status: document.getElementById('f-status').value,
    resolution: document.getElementById('f-resolution').value.trim(),
    createdAt: new Date().toISOString(),
  };
  const data = load();
  const editId = parseInt(document.getElementById('edit-id').value);
  if (editId) {
    const idx = data.findIndex(i => i.id === editId);
    if (idx >= 0) { entry.id = editId; entry.createdAt = data[idx].createdAt; data[idx] = entry; }
  } else {
    entry.id = nextId();
    data.push(entry);
  }
  save(data);
  cancelEdit();
  renderList();
}

function editIssue(id) {
  const issue = load().find(i => i.id === id);
  if (!issue) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('f-meeting').value = issue.meeting || '';
  document.getElementById('f-title').value = issue.title;
  document.getElementById('f-desc').value = issue.desc || '';
  document.getElementById('f-owner').value = issue.owner || '';
  document.getElementById('f-deadline').value = issue.deadline || '';
  document.getElementById('f-priority').value = issue.priority;
  document.getElementById('f-status').value = issue.status;
  document.getElementById('f-resolution').value = issue.resolution || '';
  document.getElementById('resolution-area').style.display = issue.status === 'resolved' ? '' : 'none';
  document.getElementById('form-title').textContent = '課題を編集';
}

function deleteIssue(id) {
  if (!confirm('削除しますか？')) return;
  save(load().filter(i => i.id !== id));
  renderList();
}

function cancelEdit() {
  ['edit-id','f-meeting','f-title','f-desc','f-owner','f-deadline','f-resolution'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-priority').value = 'mid';
  document.getElementById('f-status').value = 'open';
  document.getElementById('resolution-area').style.display = 'none';
  document.getElementById('form-title').textContent = '課題を追加';
}

function renderList() {
  const data = load();
  const q = document.getElementById('search').value.toLowerCase();
  const fs = document.getElementById('filter-status').value;
  const fp = document.getElementById('filter-priority').value;

  const filtered = data.filter(i => {
    const mq = !q || [i.title, i.desc, i.meeting, i.owner, i.resolution].join(' ').toLowerCase().includes(q);
    const ms = !fs || i.status === fs;
    const mp = !fp || i.priority === fp;
    return mq && ms && mp;
  });

  // Summary
  const open = data.filter(i => i.status === 'open').length;
  const checking = data.filter(i => i.status === 'checking').length;
  const resolved = data.filter(i => i.status === 'resolved').length;
  document.getElementById('summary-row').innerHTML = `
    <div class="summary-card"><div class="num" style="color:#991b1b">${open}</div><div class="lbl">未対応</div></div>
    <div class="summary-card"><div class="num" style="color:#856404">${checking}</div><div class="lbl">確認中</div></div>
    <div class="summary-card"><div class="num" style="color:#155724">${resolved}</div><div class="lbl">解決済</div></div>
    <div class="summary-card"><div class="num">${data.length}</div><div class="lbl">合計</div></div>
  `;

  if (!filtered.length) {
    document.getElementById('issue-list').innerHTML = `<p style="color:#888;font-size:13px;padding:20px">${data.length === 0 ? '課題を追加してください' : '該当する課題がありません'}</p>`;
    return;
  }

  // Group by meeting
  const groups = {};
  const PRIORITY_ORDER = { high: 0, mid: 1, low: 2 };
  filtered.sort((a, b) => PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority] || a.id - b.id);
  filtered.forEach(i => {
    const key = i.meeting || '（ミーティング未設定）';
    if (!groups[key]) groups[key] = [];
    groups[key].push(i);
  });

  let html = '';
  Object.entries(groups).forEach(([meeting, issues]) => {
    const openCount = issues.filter(i => i.status !== 'resolved').length;
    html += `<div class="meeting-group">
      <div class="meeting-header" onclick="toggleGroup(this)">
        <span>📅 ${escHtml(meeting)}</span>
        <span class="badge open" style="${openCount === 0 ? 'background:#d4edda;color:#155724' : ''}">${openCount === 0 ? '完了' : `未解決 ${openCount}件`}</span>
        <span class="toggle-icon">▼</span>
      </div>
      <div class="meeting-body">`;
    issues.forEach(i => {
      const pDot = `<span class="priority-dot p-${i.priority}" title="優先度：${PRIORITY_LABELS[i.priority]}"></span>`;
      const deadline = i.deadline ? `<span title="期限">📅 ${i.deadline}</span>` : '';
      const owner = i.owner ? `<span>👤 ${escHtml(i.owner)}</span>` : '';
      const resolution = i.resolution ? `<div class="issue-resolution">✅ <strong>解決:</strong> ${escHtml(i.resolution)}</div>` : '';
      html += `<div class="issue-card">
        <div style="padding-top:2px">${pDot}</div>
        <div class="issue-main">
          <div class="issue-no">ISSUE-${String(i.id).padStart(3,'0')}</div>
          <div class="issue-title">${escHtml(i.title)}</div>
          ${i.desc ? `<div class="issue-desc">${escHtml(i.desc)}</div>` : ''}
          <div class="issue-meta">
            <span class="badge ${i.status}">${STATUS_LABELS[i.status]}</span>
            ${deadline}${owner}
          </div>
          ${resolution}
        </div>
        <div class="issue-actions">
          <button class="btn-sm" onclick="editIssue(${i.id})">✏️</button>
          <button class="btn-sm" onclick="quickResolve(${i.id})" title="解決済にする" style="color:#27ae60">✅</button>
          <button class="btn-sm" onclick="deleteIssue(${i.id})" style="color:#e74c3c">🗑️</button>
        </div>
      </div>`;
    });
    html += '</div></div>';
  });
  document.getElementById('issue-list').innerHTML = html;
}

function toggleGroup(header) {
  const body = header.nextElementSibling;
  const icon = header.querySelector('.toggle-icon');
  body.style.display = body.style.display === 'none' ? '' : 'none';
  icon.textContent = body.style.display === 'none' ? '▶' : '▼';
}

function quickResolve(id) {
  const resolution = prompt('解決内容・決定事項を入力してください');
  if (resolution === null) return;
  const data = load();
  const idx = data.findIndex(i => i.id === id);
  if (idx >= 0) { data[idx].status = 'resolved'; data[idx].resolution = resolution; }
  save(data);
  renderList();
}

function exportMarkdown() {
  const data = load();
  if (!data.length) { alert('データがありません'); return; }
  const groups = {};
  data.forEach(i => {
    const key = i.meeting || '（ミーティング未設定）';
    if (!groups[key]) groups[key] = [];
    groups[key].push(i);
  });
  let md = `# 未確認事項・課題管理\n\n出力日: ${new Date().toLocaleDateString('ja-JP')}\n\n`;
  Object.entries(groups).forEach(([meeting, issues]) => {
    md += `## ${meeting}\n\n`;
    md += `| No. | 優先度 | タイトル | 確認先 | 期限 | ステータス | 解決内容 |\n|-----|--------|---------|--------|------|-----------|----------|\n`;
    issues.forEach(i => {
      md += `| ISSUE-${String(i.id).padStart(3,'0')} | ${PRIORITY_LABELS[i.priority]} | ${i.title} | ${i.owner||'-'} | ${i.deadline||'-'} | ${STATUS_LABELS[i.status]} | ${i.resolution||'-'} |\n`;
    });
    md += '\n';
  });
  saveFile(md, 'open-issues.md', 'text/markdown');
}

function loadSample() {
  const d = (offset=0) => new Date(Date.now() + offset*86400000).toISOString().slice(0, 10);
  const now = new Date().toISOString();
  const sample = [
    { id:1, meeting:'2026-05-08 第1回ヒアリング', title:'ログイン失敗時のアカウントロック回数', desc:'何回連続失敗でアカウントをロックするか未定。セキュリティポリシー上は5回が一般的だが、業務特性（頻繁な入力誤りの有無）を確認したい。', owner:'田中部長', deadline:d(7), priority:'high', status:'open', resolution:'', createdAt:now },
    { id:2, meeting:'2026-05-08 第1回ヒアリング', title:'パスワードポリシーの詳細（文字種・有効期限）', desc:'大文字・小文字・数字・記号の混在要件と有効期限（90日 or 180日）を確認が必要。社内セキュリティ規定があれば共有してほしい。', owner:'田中部長', deadline:d(7), priority:'high', status:'checking', resolution:'', createdAt:now },
    { id:3, meeting:'2026-05-08 第1回ヒアリング', title:'承認フローのパターン数と各フロー', desc:'部署によって承認フローが異なると聞いている。具体的に何パターンあるか、各フローの承認ステップ数と承認者ロールを整理してほしい。', owner:'田中部長・業務担当 佐藤様', deadline:d(14), priority:'high', status:'open', resolution:'', createdAt:now },
    { id:4, meeting:'2026-05-08 第1回ヒアリング', title:'既存ExcelデータのフォーマットとDB移行件数', desc:'現行のExcel申請データをどのシートからどの形式で受け取るか確認。移行対象の件数（概算）と過去データの扱いも確認が必要。', owner:'IT部門 鈴木様', deadline:d(14), priority:'high', status:'open', resolution:'', createdAt:now },
    { id:5, meeting:'2026-05-08 第1回ヒアリング', title:'添付ファイルのサイズ上限・種類', desc:'ファイルアップロード機能についてサイズ上限（5MB or 10MB？）と許可するMIMEタイプ（PDF/Excel/画像のみ？）の確認が必要。', owner:'業務担当 佐藤様', deadline:d(10), priority:'mid', status:'checking', resolution:'', createdAt:now },
    { id:6, meeting:'2026-05-15 第2回ヒアリング', title:'CSVエクスポートの対象データと出力項目', desc:'月次集計で使うCSVエクスポートの対象範囲（全申請 or 部署別）と出力項目の一覧を確認。列名・並び順の指定があればExcelサンプルで共有してほしい。', owner:'経理担当 山田様', deadline:d(5), priority:'mid', status:'resolved', resolution:'全申請対象（ステータス絞り込みあり）。出力項目は申請ID・申請種別・申請者名・申請日・金額・ステータス・承認日・承認者名の8項目。2026-05-15確認済。', createdAt:now },
    { id:7, meeting:'2026-05-15 第2回ヒアリング', title:'同時接続ユーザー数の想定とピークタイミング', desc:'非機能要件（性能設計）として同時接続数の目安が必要。月次締め処理時にピークになると想定されるが、具体的な人数と時間帯を確認。', owner:'田中部長', deadline:d(7), priority:'mid', status:'open', resolution:'', createdAt:now },
    { id:8, meeting:'2026-05-15 第2回ヒアリング', title:'差し戻し後の申請フロー（修正→再申請の扱い）', desc:'承認者が差し戻した場合、申請者が修正して再申請するフローの詳細が未確認。新規IDを発行するか、同一IDで版管理するかの確認が必要。', owner:'業務担当 佐藤様', deadline:d(10), priority:'high', status:'open', resolution:'', createdAt:now },
    { id:9, meeting:'2026-05-15 第2回ヒアリング', title:'メール通知の送信タイミングと宛先ルール', desc:'通知メールの送信タイミング（提出時・承認時・却下時）と宛先（申請者本人のみ or CC設定あり？）の詳細を確認。メールテンプレートの文面も確認が必要。', owner:'田中部長', deadline:d(14), priority:'mid', status:'open', resolution:'', createdAt:now },
    { id:10, meeting:'2026-05-15 第2回ヒアリング', title:'Salesforce連携のAPI仕様・バージョン', desc:'社員マスタをSalesforceから同期する要件あり。利用するSalesforce APIのバージョンとエンドポイント、認証方式（OAuth2）の詳細をIT部門から取得する必要あり。', owner:'IT部門 鈴木様', deadline:d(21), priority:'mid', status:'checking', resolution:'', createdAt:now },
    { id:11, meeting:'2026-05-22 第3回ヒアリング', title:'外部ベンダーへの脆弱性診断の実施有無と予算', desc:'本番リリース前の脆弱性診断（外部委託）が必要かどうか、予算が確保されているか確認。診断範囲と実施タイミングも合わせて確認。', owner:'田中部長', deadline:d(30), priority:'low', status:'open', resolution:'', createdAt:now },
    { id:12, meeting:'2026-05-22 第3回ヒアリング', title:'ユーザー向けトレーニング・マニュアルの範囲', desc:'マニュアル作成の対象範囲（一般ユーザー向け操作マニュアル、管理者向け管理マニュアル）と作成形式（PDF or Web）を確認。', owner:'業務担当 佐藤様', deadline:d(45), priority:'low', status:'resolved', resolution:'PDF形式で2種類作成する。一般ユーザー向けと管理者向けそれぞれ20ページ程度。納品はリリース2週間前。2026-05-22確認済。', createdAt:now },
  ];
  save(sample);
  renderList();
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function _getLastHandle() {
  return new Promise(r => {
    try {
      const req = indexedDB.open('tool-prefs', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('prefs');
      req.onsuccess = e => { const g = e.target.result.transaction('prefs','readonly').objectStore('prefs').get('h'); g.onsuccess = () => r(g.result||null); g.onerror = () => r(null); };
      req.onerror = () => r(null);
    } catch { r(null); }
  });
}
async function _setLastHandle(h) {
  return new Promise(r => {
    try {
      const req = indexedDB.open('tool-prefs', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('prefs');
      req.onsuccess = e => { const tx = e.target.result.transaction('prefs','readwrite'); tx.objectStore('prefs').put(h,'h'); tx.oncomplete = r; tx.onerror = r; };
      req.onerror = r;
    } catch { r(); }
  });
}
async function saveFile(content, filename, mimeType) {
  const ts = new Date().toISOString().slice(0,19).replace(/:/g,'-');
  const dot = filename.lastIndexOf('.');
  const named = dot > 0 ? filename.slice(0,dot) + '_' + ts + filename.slice(dot) : filename + '_' + ts;
  if (window.showSaveFilePicker) {
    try {
      const last = await _getLastHandle();
      const opts = { suggestedName: named, types: [{ description: filename, accept: { [mimeType]: ['.' + filename.split('.').pop()] } }] };
      if (last) opts.startIn = last;
      const handle = await window.showSaveFilePicker(opts);
      const w = await handle.createWritable();
      await w.write(new Blob([content], {type: mimeType}));
      await w.close();
      await _setLastHandle(handle);
      return;
    } catch(e) { if (e.name === 'AbortError') return; }
  }
  const blob = new Blob([content], {type: mimeType});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = named; a.click();
}
async function openFile(accept) {
  const last = await _getLastHandle();
  if (window.showOpenFilePicker) {
    try {
      const exts = accept.split(',').map(s => s.trim());
      const mimes = { '.json':'application/json', '.yaml':'text/yaml', '.yml':'text/yaml', '.md':'text/markdown', '.txt':'text/plain', '.csv':'text/csv' };
      const acceptMap = {};
      exts.forEach(e => { const m = mimes[e]||'application/octet-stream'; (acceptMap[m]=acceptMap[m]||[]).push(e); });
      const opts = { multiple: false, types: [{ description: 'File', accept: acceptMap }] };
      if (last) opts.startIn = last;
      const [handle] = await window.showOpenFilePicker(opts);
      await _setLastHandle(handle);
      return await handle.getFile();
    } catch(e) { if (e.name === 'AbortError') return null; }
  }
  return new Promise(r => {
    const input = document.createElement('input'); input.type = 'file'; input.accept = accept;
    input.onchange = e => r(e.target.files[0]||null);
    input.click();
  });
}

function exportJSON() {
  saveFile(JSON.stringify(load(), null, 2), 'open-issues.json', 'application/json');
}
async function importJSON() {
  const file = await openFile('.json');
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error('配列形式のJSONを指定してください');
      if (!confirm('現在のデータを読み込んだデータで上書きしますか？')) return;
      save(data); renderList();
    } catch(e) { alert('読み込みに失敗しました: ' + e.message); }
  };
  reader.readAsText(file);
}

document.getElementById('f-deadline').value = new Date(Date.now()+14*86400000).toISOString().slice(0,10);
renderList();
