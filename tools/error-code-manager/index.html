<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>エラーコード管理ツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
header { background: #2c3e50; color: #fff; padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
header h1 { font-size: 16px; }
header button { padding: 5px 12px; border: 1px solid #fff; background: transparent; color: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
header button:hover { background: rgba(255,255,255,0.15); }
.workspace { display: flex; flex: 1; overflow: hidden; }
.pane-left { width: 360px; background: #fff; border-right: 1px solid #ddd; padding: 14px; overflow-y: auto; flex-shrink: 0; }
.pane-right { flex: 1; overflow-y: auto; padding: 14px; }
h2 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin: 14px 0 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
h2:first-child { margin-top: 0; }
label { font-size: 12px; color: #666; display: block; margin-bottom: 3px; }
input, select, textarea { border: 1px solid #ccc; border-radius: 4px; padding: 7px 10px; font-size: 13px; width: 100%; margin-bottom: 8px; }
textarea { resize: vertical; }
.btn { padding: 8px 20px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: bold; }
.btn-primary { background: #4a90e2; color: #fff; width: 100%; }
.btn-primary:hover { background: #357abd; }
.btn-sm { background: #ecf0f1; border: 1px solid #ccc; padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }
.btn-sm:hover { background: #dce1e7; }
.search-row { display: flex; gap: 8px; margin-bottom: 12px; }
.search-row input { flex: 1; }
.search-row select { width: auto; }
table.list { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; }
table.list th { background: #f5f5f5; padding: 8px 10px; border: 1px solid #ddd; font-weight: 600; color: #555; text-align: left; white-space: nowrap; }
table.list td { padding: 8px 10px; border: 1px solid #eee; vertical-align: top; }
table.list tr:hover td { background: #f9fbff; }
.badge-status { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; white-space: nowrap; }
.s2xx { background: #d4edda; color: #155724; }
.s3xx { background: #fff3cd; color: #856404; }
.s4xx { background: #f8d7da; color: #721c24; }
.s5xx { background: #f8d7da; color: #721c24; }
.s0 { background: #e2e3e5; color: #383d41; }
.action-btn { background: transparent; border: none; cursor: pointer; padding: 2px 6px; font-size: 13px; border-radius: 3px; }
.action-btn:hover { background: #eee; }
.count-badge { background: #4a90e2; color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 11px; margin-left: 4px; }
pre.md-out { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 6px; font-size: 12px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
</style>
</head>
<body>
<header>
  <h1>エラーコード管理ツール</h1>
  <button onclick="loadSample()">サンプルデータ</button>
  <button onclick="exportMarkdown()">Markdownエクスポート</button>
  <button onclick="exportCSV()">CSVエクスポート</button>
  <button onclick="clearAll()" style="border-color:#e74c3c;color:#f9a9a9">全件削除</button>
  <button onclick="exportJSON()" style="border-color:#a0c4ff">💾 保存</button>
  <button onclick="importJSON()">📂 読み込み</button>
</header>
<div class="workspace">
  <div class="pane-left">
    <h2 id="form-title">エラーコード追加</h2>
    <input type="hidden" id="edit-index" value="-1">
    <label>エラーコード</label>
    <input type="text" id="f-code" placeholder="E001, ERR_AUTH_001">
    <label>HTTPステータス</label>
    <select id="f-http">
      <option value="">-- 選択 --</option>
      <option value="200">200 OK</option>
      <option value="201">201 Created</option>
      <option value="400">400 Bad Request</option>
      <option value="401">401 Unauthorized</option>
      <option value="403">403 Forbidden</option>
      <option value="404">404 Not Found</option>
      <option value="409">409 Conflict</option>
      <option value="422">422 Unprocessable Entity</option>
      <option value="429">429 Too Many Requests</option>
      <option value="500">500 Internal Server Error</option>
      <option value="502">502 Bad Gateway</option>
      <option value="503">503 Service Unavailable</option>
    </select>
    <label>エラーメッセージ（ユーザー向け）</label>
    <input type="text" id="f-message" placeholder="入力値が不正です">
    <label>説明（開発者向け）</label>
    <textarea id="f-desc" rows="3" placeholder="バリデーションエラー。必須項目が未入力の場合に返却"></textarea>
    <label>発生箇所・条件</label>
    <input type="text" id="f-location" placeholder="ログインAPI / メールアドレス未入力時">
    <label>カテゴリ</label>
    <select id="f-category">
      <option value="">-- 未分類 --</option>
      <option value="認証・認可">認証・認可</option>
      <option value="バリデーション">バリデーション</option>
      <option value="ビジネスロジック">ビジネスロジック</option>
      <option value="データベース">データベース</option>
      <option value="外部API">外部API</option>
      <option value="システム">システム</option>
      <option value="ネットワーク">ネットワーク</option>
    </select>
    <button class="btn btn-primary" onclick="saveError()">保存</button>
    <button class="btn-sm" style="margin-top:8px;width:100%;text-align:center" onclick="cancelEdit()">キャンセル</button>
  </div>

  <div class="pane-right">
    <div class="search-row">
      <input type="text" id="search" placeholder="コード・メッセージ・説明で検索..." oninput="renderList()">
      <select id="filter-http" onchange="renderList()">
        <option value="">すべてのHTTPステータス</option>
        <option value="2">2xx 成功</option>
        <option value="4">4xx クライアントエラー</option>
        <option value="5">5xx サーバーエラー</option>
      </select>
      <select id="filter-cat" onchange="renderList()">
        <option value="">すべてのカテゴリ</option>
        <option value="認証・認可">認証・認可</option>
        <option value="バリデーション">バリデーション</option>
        <option value="ビジネスロジック">ビジネスロジック</option>
        <option value="データベース">データベース</option>
        <option value="外部API">外部API</option>
        <option value="システム">システム</option>
        <option value="ネットワーク">ネットワーク</option>
      </select>
    </div>
    <div id="list-container"></div>
  </div>
</div>
<script>
const STORAGE_KEY = 'error-codes-v1';

function load() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
function save(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function statusClass(http) {
  if (!http) return 's0';
  if (http.startsWith('2')) return 's2xx';
  if (http.startsWith('3')) return 's3xx';
  if (http.startsWith('4')) return 's4xx';
  if (http.startsWith('5')) return 's5xx';
  return 's0';
}

function renderList() {
  const data = load();
  const q = document.getElementById('search').value.toLowerCase();
  const filterHttp = document.getElementById('filter-http').value;
  const filterCat = document.getElementById('filter-cat').value;

  const filtered = data.filter(e => {
    const matchQ = !q || [e.code, e.message, e.desc, e.location, e.category].join(' ').toLowerCase().includes(q);
    const matchHttp = !filterHttp || (e.http && e.http.startsWith(filterHttp));
    const matchCat = !filterCat || e.category === filterCat;
    return matchQ && matchHttp && matchCat;
  });

  if (!filtered.length) {
    document.getElementById('list-container').innerHTML = `<p style="color:#888;font-size:13px;padding:20px">${data.length === 0 ? 'エラーコードを追加してください' : '該当するエラーコードがありません'}</p>`;
    return;
  }

  let html = `<p style="font-size:12px;color:#888;margin-bottom:8px">${filtered.length}件表示 / 全${data.length}件</p>
  <table class="list"><thead><tr>
    <th>コード</th><th>HTTP</th><th>カテゴリ</th><th>メッセージ</th><th>説明</th><th>発生箇所</th><th>操作</th>
  </tr></thead><tbody>`;

  filtered.forEach((e, i) => {
    const origIdx = data.indexOf(e);
    html += `<tr>
      <td><strong>${escHtml(e.code)}</strong></td>
      <td><span class="badge-status ${statusClass(e.http)}">${e.http || '-'}</span></td>
      <td style="font-size:12px;color:#666">${escHtml(e.category || '-')}</td>
      <td>${escHtml(e.message)}</td>
      <td style="font-size:12px;color:#666;max-width:200px">${escHtml(e.desc || '-')}</td>
      <td style="font-size:12px;color:#666">${escHtml(e.location || '-')}</td>
      <td style="white-space:nowrap">
        <button class="action-btn" onclick="editError(${origIdx})" title="編集">✏️</button>
        <button class="action-btn" onclick="deleteError(${origIdx})" title="削除">🗑️</button>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('list-container').innerHTML = html;
}

function saveError() {
  const code = document.getElementById('f-code').value.trim();
  const message = document.getElementById('f-message').value.trim();
  if (!code || !message) { alert('エラーコードとメッセージは必須です'); return; }

  const entry = {
    code,
    http: document.getElementById('f-http').value,
    message,
    desc: document.getElementById('f-desc').value.trim(),
    location: document.getElementById('f-location').value.trim(),
    category: document.getElementById('f-category').value,
  };

  const data = load();
  const idx = parseInt(document.getElementById('edit-index').value);
  if (idx >= 0) { data[idx] = entry; } else { data.push(entry); }
  save(data);
  cancelEdit();
  renderList();
}

function editError(idx) {
  const e = load()[idx];
  document.getElementById('edit-index').value = idx;
  document.getElementById('f-code').value = e.code;
  document.getElementById('f-http').value = e.http || '';
  document.getElementById('f-message').value = e.message;
  document.getElementById('f-desc').value = e.desc || '';
  document.getElementById('f-location').value = e.location || '';
  document.getElementById('f-category').value = e.category || '';
  document.getElementById('form-title').textContent = 'エラーコード編集';
  document.getElementById('f-code').focus();
}

function deleteError(idx) {
  if (!confirm('削除しますか？')) return;
  const data = load();
  data.splice(idx, 1);
  save(data);
  renderList();
}

function cancelEdit() {
  document.getElementById('edit-index').value = '-1';
  document.getElementById('f-code').value = '';
  document.getElementById('f-http').value = '';
  document.getElementById('f-message').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-location').value = '';
  document.getElementById('f-category').value = '';
  document.getElementById('form-title').textContent = 'エラーコード追加';
}

async function _getLastHandle() {
  return new Promise(r => {
    try {
      const req = indexedDB.open('tool-prefs', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('prefs');
      req.onsuccess = e => { const g = e.target.result.transaction('prefs','readonly').objectStore('prefs').get('h'); g.onsuccess = () => r(g.result||null); g.onerror = () => r(null); };
      req.onerror = () => r(null);
    } catch { r(null); }
  });
}
async function _setLastHandle(h) {
  return new Promise(r => {
    try {
      const req = indexedDB.open('tool-prefs', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('prefs');
      req.onsuccess = e => { const tx = e.target.result.transaction('prefs','readwrite'); tx.objectStore('prefs').put(h,'h'); tx.oncomplete = r; tx.onerror = r; };
      req.onerror = r;
    } catch { r(); }
  });
}
async function saveFile(content, filename, mimeType) {
  const ts = new Date().toISOString().slice(0,19).replace(/:/g,'-');
  const dot = filename.lastIndexOf('.');
  const named = dot > 0 ? filename.slice(0,dot) + '_' + ts + filename.slice(dot) : filename + '_' + ts;
  if (window.showSaveFilePicker) {
    try {
      const last = await _getLastHandle();
      const opts = { suggestedName: named, types: [{ description: filename, accept: { [mimeType]: ['.' + filename.split('.').pop()] } }] };
      if (last) opts.startIn = last;
      const handle = await window.showSaveFilePicker(opts);
      const w = await handle.createWritable();
      await w.write(new Blob([content], {type: mimeType}));
      await w.close();
      await _setLastHandle(handle);
      return;
    } catch(e) { if (e.name === 'AbortError') return; }
  }
  const blob = new Blob([content], {type: mimeType});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = named; a.click();
}
async function openFile(accept) {
  const last = await _getLastHandle();
  if (window.showOpenFilePicker) {
    try {
      const exts = accept.split(',').map(s => s.trim());
      const mimes = { '.json':'application/json', '.yaml':'text/yaml', '.yml':'text/yaml', '.md':'text/markdown', '.txt':'text/plain', '.csv':'text/csv' };
      const acceptMap = {};
      exts.forEach(e => { const m = mimes[e]||'application/octet-stream'; (acceptMap[m]=acceptMap[m]||[]).push(e); });
      const opts = { multiple: false, types: [{ description: 'File', accept: acceptMap }] };
      if (last) opts.startIn = last;
      const [handle] = await window.showOpenFilePicker(opts);
      await _setLastHandle(handle);
      return await handle.getFile();
    } catch(e) { if (e.name === 'AbortError') return null; }
  }
  return new Promise(r => {
    const input = document.createElement('input'); input.type = 'file'; input.accept = accept;
    input.onchange = e => r(e.target.files[0]||null);
    input.click();
  });
}

function exportMarkdown() {
  const data = load();
  if (!data.length) { alert('データがありません'); return; }
  const cats = [...new Set(data.map(e => e.category || '未分類'))];
  let md = '# エラーコード一覧\n\n';
  cats.forEach(cat => {
    md += `## ${cat}\n\n| コード | HTTP | メッセージ | 説明 | 発生箇所 |\n|--------|------|-----------|------|----------|\n`;
    data.filter(e => (e.category || '未分類') === cat).forEach(e => {
      md += `| \`${e.code}\` | ${e.http || '-'} | ${e.message} | ${e.desc || '-'} | ${e.location || '-'} |\n`;
    });
    md += '\n';
  });
  saveFile(md, 'error-codes.md', 'text/markdown');
}

function exportCSV() {
  const data = load();
  if (!data.length) { alert('データがありません'); return; }
  let csv = 'コード,HTTPステータス,メッセージ,説明,発生箇所,カテゴリ\n';
  data.forEach(e => {
    csv += `"${e.code}","${e.http || ''}","${e.message}","${e.desc || ''}","${e.location || ''}","${e.category || ''}"\n`;
  });
  saveFile('﻿' + csv, 'error-codes.csv', 'text/csv');
}

function clearAll() {
  if (!confirm('全件削除しますか？この操作は元に戻せません。')) return;
  save([]);
  renderList();
}

function loadSample() {
  const sample = [
    { code: 'E001', http: '400', message: '入力値が不正です', desc: '必須項目が未入力、または形式不正', location: '全APIの入力バリデーション', category: 'バリデーション' },
    { code: 'E002', http: '400', message: 'メールアドレスの形式が不正です', desc: 'メールアドレスの形式チェックエラー', location: '会員登録API / ログインAPI', category: 'バリデーション' },
    { code: 'E003', http: '401', message: 'ログインが必要です', desc: '認証トークンが未設定、または期限切れ', location: '認証が必要な全API', category: '認証・認可' },
    { code: 'E004', http: '401', message: 'メールアドレスまたはパスワードが違います', desc: 'ログイン失敗', location: 'ログインAPI', category: '認証・認可' },
    { code: 'E005', http: '403', message: 'この操作を行う権限がありません', desc: 'ロール不足による認可エラー', location: '管理者専用API', category: '認証・認可' },
    { code: 'E006', http: '404', message: 'リソースが見つかりません', desc: '指定IDのリソースが存在しない', location: '詳細取得・更新・削除API', category: 'ビジネスロジック' },
    { code: 'E007', http: '409', message: 'このメールアドレスは既に登録されています', desc: 'メールアドレスの一意制約違反', location: '会員登録API', category: 'ビジネスロジック' },
    { code: 'E008', http: '429', message: 'リクエストが多すぎます。しばらくしてからお試しください', desc: 'レートリミット超過', location: '全API', category: 'システム' },
    { code: 'E099', http: '500', message: 'サーバーエラーが発生しました。時間をおいてお試しください', desc: '予期しないサーバーサイドエラー', location: '全API', category: 'システム' },
  ];
  save(sample);
  renderList();
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function exportJSON() {
  saveFile(JSON.stringify(load(), null, 2), 'error-codes.json', 'application/json');
}
async function importJSON() {
  const file = await openFile('.json');
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error('配列形式のJSONを指定してください');
      if (!confirm('現在のデータを読み込んだデータで上書きしますか？')) return;
      save(data); renderList();
    } catch(e) { alert('読み込みに失敗しました: ' + e.message); }
  };
  reader.readAsText(file);
}

renderList();
</script>
</body>
</html>
