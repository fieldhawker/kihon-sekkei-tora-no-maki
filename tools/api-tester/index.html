<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>APIテスト送信フォーム</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #f0f2f5; min-height: 100vh; }
header { background: #2c3e50; color: #fff; padding: 10px 20px; font-size: 16px; font-weight: bold; }
.container { display: flex; gap: 0; height: calc(100vh - 42px); }
.pane { flex: 1; padding: 16px; overflow-y: auto; }
.pane-left { background: #fff; border-right: 1px solid #ddd; }
.pane-right { background: #fafafa; }
h2 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
.row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
select, input[type=text], textarea { border: 1px solid #ccc; border-radius: 4px; padding: 7px 10px; font-size: 13px; width: 100%; }
select { width: auto; min-width: 90px; }
textarea { font-family: monospace; resize: vertical; }
.btn-send { background: #27ae60; color: #fff; border: none; padding: 8px 20px; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: bold; }
.btn-send:hover { background: #219a52; }
.btn-sm { background: #ecf0f1; border: 1px solid #ccc; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
.btn-sm:hover { background: #dce1e7; }
.btn-danger { background: #e74c3c; color: #fff; border: none; padding: 3px 8px; border-radius: 3px; font-size: 11px; cursor: pointer; }
.kv-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
.kv-row input { flex: 1; }
.tab-bar { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 2px solid #eee; }
.tab { padding: 7px 14px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: #666; }
.tab.active { color: #4a90e2; border-bottom-color: #4a90e2; font-weight: bold; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; margin-bottom: 8px; }
.s2xx { background: #d4edda; color: #155724; }
.s3xx { background: #fff3cd; color: #856404; }
.s4xx { background: #f8d7da; color: #721c24; }
.s5xx { background: #f8d7da; color: #721c24; }
.s0 { background: #e2e3e5; color: #383d41; }
pre { background: #1e1e1e; color: #d4d4d4; padding: 14px; border-radius: 6px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }
.history-item { padding: 8px 10px; border: 1px solid #eee; border-radius: 4px; margin-bottom: 6px; cursor: pointer; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
.history-item:hover { background: #f0f4ff; }
.history-method { font-weight: bold; margin-right: 6px; }
.loading { color: #888; font-size: 13px; padding: 20px; text-align: center; }
.resp-header { font-size: 12px; color: #555; margin-bottom: 8px; }
</style>
</head>
<body>
<header style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
  <span style="font-size:16px;font-weight:bold">APIテスト送信フォーム</span>
  <button onclick="exportJSON()" style="padding:5px 12px;border:1px solid #a0c4ff;background:transparent;color:#fff;border-radius:4px;cursor:pointer;font-size:13px">💾 保存</button>
  <button onclick="importJSON()" style="padding:5px 12px;border:1px solid #fff;background:transparent;color:#fff;border-radius:4px;cursor:pointer;font-size:13px">📂 読み込み</button>
</header>
<div class="container">
  <div class="pane pane-left">
    <h2>リクエスト</h2>
    <div class="row">
      <select id="method">
        <option>GET</option><option>POST</option><option>PUT</option>
        <option>PATCH</option><option>DELETE</option><option>OPTIONS</option>
      </select>
      <input type="text" id="url" placeholder="https://api.example.com/v1/users" style="flex:1">
      <button class="btn-send" onclick="sendRequest()">送信</button>
    </div>

    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('headers')">ヘッダー</div>
      <div class="tab" onclick="switchTab('body')">ボディ</div>
      <div class="tab" onclick="switchTab('query')">クエリパラメータ</div>
      <div class="tab" onclick="switchTab('history')">履歴</div>
    </div>

    <div id="tab-headers" class="tab-content active">
      <div id="headers-list"></div>
      <button class="btn-sm" onclick="addHeader()">＋ ヘッダー追加</button>
      <div style="margin-top:10px">
        <button class="btn-sm" onclick="addAuthHeader()">Bearer トークン追加</button>
        <button class="btn-sm" onclick="addContentType()">Content-Type: application/json</button>
      </div>
    </div>

    <div id="tab-body" class="tab-content">
      <div class="tab-bar" style="margin-bottom:8px">
        <div class="tab active" id="body-tab-json" onclick="switchBodyTab('json')">JSON</div>
        <div class="tab" id="body-tab-form" onclick="switchBodyTab('form')">フォームデータ</div>
        <div class="tab" id="body-tab-none" onclick="switchBodyTab('none')">なし</div>
      </div>
      <div id="body-json">
        <textarea id="body-json-text" rows="12" placeholder='{"key": "value"}'></textarea>
        <button class="btn-sm" style="margin-top:4px" onclick="formatJSON()">整形</button>
      </div>
      <div id="body-form" style="display:none">
        <div id="form-list"></div>
        <button class="btn-sm" onclick="addFormField()">＋ フィールド追加</button>
      </div>
      <div id="body-none" style="display:none"><p style="color:#888;font-size:13px;padding:8px">ボディなし</p></div>
    </div>

    <div id="tab-query" class="tab-content">
      <div id="query-list"></div>
      <button class="btn-sm" onclick="addQuery()">＋ パラメータ追加</button>
    </div>

    <div id="tab-history" class="tab-content">
      <div id="history-list"></div>
      <button class="btn-sm" onclick="clearHistory()">履歴クリア</button>
    </div>
  </div>

  <div class="pane pane-right">
    <h2>レスポンス</h2>
    <div id="response-area">
      <p class="loading">リクエストを送信すると結果が表示されます</p>
    </div>
  </div>
</div>

<script>
let bodyMode = 'json';

function switchTab(name) {
  document.querySelectorAll('.tab-bar:first-of-type .tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function switchBodyTab(mode) {
  bodyMode = mode;
  ['json','form','none'].forEach(m => {
    document.getElementById('body-' + m).style.display = m === mode ? '' : 'none';
    document.getElementById('body-tab-' + m).classList.toggle('active', m === mode);
  });
}

function makeKVRow(containerId, kPlaceholder, vPlaceholder) {
  const row = document.createElement('div');
  row.className = 'kv-row';
  row.innerHTML = `<input type="text" placeholder="${kPlaceholder}"><input type="text" placeholder="${vPlaceholder}"><button class="btn-danger" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById(containerId).appendChild(row);
  return row;
}

function addHeader() { makeKVRow('headers-list', 'ヘッダー名', '値'); }
function addQuery() { makeKVRow('query-list', 'パラメータ名', '値'); }
function addFormField() { makeKVRow('form-list', 'フィールド名', '値'); }

function addAuthHeader() {
  const token = prompt('Bearerトークンを入力してください');
  if (token === null) return;
  const row = makeKVRow('headers-list', 'ヘッダー名', '値');
  row.querySelectorAll('input')[0].value = 'Authorization';
  row.querySelectorAll('input')[1].value = 'Bearer ' + token;
}

function addContentType() {
  const row = makeKVRow('headers-list', 'ヘッダー名', '値');
  row.querySelectorAll('input')[0].value = 'Content-Type';
  row.querySelectorAll('input')[1].value = 'application/json';
}

function getKVPairs(containerId) {
  const result = {};
  document.getElementById(containerId).querySelectorAll('.kv-row').forEach(row => {
    const [k, v] = row.querySelectorAll('input');
    if (k.value.trim()) result[k.value.trim()] = v.value.trim();
  });
  return result;
}

function formatJSON() {
  try {
    const txt = document.getElementById('body-json-text').value;
    document.getElementById('body-json-text').value = JSON.stringify(JSON.parse(txt), null, 2);
  } catch(e) { alert('JSONが不正です: ' + e.message); }
}

async function sendRequest() {
  const method = document.getElementById('method').value;
  let url = document.getElementById('url').value.trim();
  if (!url) { alert('URLを入力してください'); return; }

  const queryParams = getKVPairs('query-list');
  if (Object.keys(queryParams).length > 0) {
    const u = new URL(url.startsWith('http') ? url : 'https://' + url);
    Object.entries(queryParams).forEach(([k, v]) => u.searchParams.set(k, v));
    url = u.toString();
  }

  const headers = getKVPairs('headers-list');
  let body = undefined;
  if (!['GET','DELETE','OPTIONS'].includes(method)) {
    if (bodyMode === 'json') {
      const txt = document.getElementById('body-json-text').value.trim();
      if (txt) body = txt;
    } else if (bodyMode === 'form') {
      const fd = new FormData();
      document.getElementById('form-list').querySelectorAll('.kv-row').forEach(row => {
        const [k, v] = row.querySelectorAll('input');
        if (k.value.trim()) fd.append(k.value.trim(), v.value.trim());
      });
      body = fd;
    }
  }

  document.getElementById('response-area').innerHTML = '<p class="loading">送信中...</p>';
  const startTime = Date.now();

  try {
    const res = await fetch(url, { method, headers, body });
    const elapsed = Date.now() - startTime;
    const contentType = res.headers.get('content-type') || '';
    let text = await res.text();
    let formatted = text;
    if (contentType.includes('json')) {
      try { formatted = JSON.stringify(JSON.parse(text), null, 2); } catch(e) {}
    }

    const statusClass = res.status >= 500 ? 's5xx' : res.status >= 400 ? 's4xx' : res.status >= 300 ? 's3xx' : 's2xx';
    let headersHtml = '';
    res.headers.forEach((v, k) => { headersHtml += `<tr><td style="color:#888;padding-right:12px">${k}</td><td>${v}</td></tr>`; });

    document.getElementById('response-area').innerHTML = `
      <span class="status-badge ${statusClass}">HTTP ${res.status} ${res.statusText}</span>
      <span style="font-size:12px;color:#888;margin-left:8px">${elapsed}ms</span>
      <div class="tab-bar" style="margin-top:10px">
        <div class="tab active" onclick="showRespTab('body',this)">ボディ</div>
        <div class="tab" onclick="showRespTab('resp-headers',this)">ヘッダー</div>
      </div>
      <div id="resp-body-tab"><pre>${escapeHtml(formatted)}</pre></div>
      <div id="resp-headers-tab" style="display:none"><table style="font-size:12px;border-collapse:collapse">${headersHtml}</table></div>
    `;
    saveHistory(method, url, res.status);
  } catch(e) {
    document.getElementById('response-area').innerHTML = `
      <span class="status-badge s0">エラー</span>
      <pre style="margin-top:8px">${escapeHtml(e.message)}\n\nCORSポリシーによりブラウザから直接送信できない場合があります。\nその場合はプロキシサーバー経由でのアクセスをご検討ください。</pre>
    `;
  }
}

function showRespTab(name, el) {
  document.getElementById('resp-body-tab').style.display = name === 'body' ? '' : 'none';
  document.getElementById('resp-headers-tab').style.display = name === 'resp-headers' ? '' : 'none';
  el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function saveHistory(method, url, status) {
  const history = JSON.parse(localStorage.getItem('api-history') || '[]');
  history.unshift({ method, url, status, time: new Date().toLocaleTimeString() });
  localStorage.setItem('api-history', JSON.stringify(history.slice(0, 30)));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem('api-history') || '[]');
  const el = document.getElementById('history-list');
  el.innerHTML = history.map((h, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <span><span class="history-method">${h.method}</span>${h.url.length > 50 ? h.url.slice(0,50) + '...' : h.url}</span>
      <span style="color:#888">${h.status} | ${h.time}</span>
    </div>
  `).join('') || '<p style="color:#888;font-size:13px">履歴なし</p>';
}

function loadHistory(i) {
  const h = JSON.parse(localStorage.getItem('api-history') || '[]')[i];
  document.getElementById('method').value = h.method;
  document.getElementById('url').value = h.url;
}

function clearHistory() {
  localStorage.removeItem('api-history');
  renderHistory();
}

async function _getLastHandle() {
  return new Promise(r => {
    try {
      const req = indexedDB.open('tool-prefs', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('prefs');
      req.onsuccess = e => { const g = e.target.result.transaction('prefs','readonly').objectStore('prefs').get('h'); g.onsuccess = () => r(g.result||null); g.onerror = () => r(null); };
      req.onerror = () => r(null);
    } catch { r(null); }
  });
}
async function _setLastHandle(h) {
  return new Promise(r => {
    try {
      const req = indexedDB.open('tool-prefs', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('prefs');
      req.onsuccess = e => { const tx = e.target.result.transaction('prefs','readwrite'); tx.objectStore('prefs').put(h,'h'); tx.oncomplete = r; tx.onerror = r; };
      req.onerror = r;
    } catch { r(); }
  });
}
async function saveFile(content, filename, mimeType) {
  const ts = new Date().toISOString().slice(0,19).replace(/:/g,'-');
  const dot = filename.lastIndexOf('.');
  const named = dot > 0 ? filename.slice(0,dot) + '_' + ts + filename.slice(dot) : filename + '_' + ts;
  if (window.showSaveFilePicker) {
    try {
      const last = await _getLastHandle();
      const opts = { suggestedName: named, types: [{ description: filename, accept: { [mimeType]: ['.' + filename.split('.').pop()] } }] };
      if (last) opts.startIn = last;
      const handle = await window.showSaveFilePicker(opts);
      const w = await handle.createWritable();
      await w.write(new Blob([content], {type: mimeType}));
      await w.close();
      await _setLastHandle(handle);
      return;
    } catch(e) { if (e.name === 'AbortError') return; }
  }
  const blob = new Blob([content], {type: mimeType});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = named; a.click();
}
async function openFile(accept) {
  const last = await _getLastHandle();
  if (window.showOpenFilePicker) {
    try {
      const exts = accept.split(',').map(s => s.trim());
      const mimes = { '.json':'application/json', '.yaml':'text/yaml', '.yml':'text/yaml', '.md':'text/markdown', '.txt':'text/plain', '.csv':'text/csv' };
      const acceptMap = {};
      exts.forEach(e => { const m = mimes[e]||'application/octet-stream'; (acceptMap[m]=acceptMap[m]||[]).push(e); });
      const opts = { multiple: false, types: [{ description: 'File', accept: acceptMap }] };
      if (last) opts.startIn = last;
      const [handle] = await window.showOpenFilePicker(opts);
      await _setLastHandle(handle);
      return await handle.getFile();
    } catch(e) { if (e.name === 'AbortError') return null; }
  }
  return new Promise(r => {
    const input = document.createElement('input'); input.type = 'file'; input.accept = accept;
    input.onchange = e => r(e.target.files[0]||null);
    input.click();
  });
}

function exportJSON() {
  const state = {
    method: document.getElementById('method').value,
    url: document.getElementById('url').value,
    bodyMode,
    bodyJson: document.getElementById('body-json-text').value,
    headers: getKVPairs('headers-list'),
    query: getKVPairs('query-list'),
    history: JSON.parse(localStorage.getItem('api-history') || '[]'),
  };
  saveFile(JSON.stringify(state, null, 2), 'api-tester.json', 'application/json');
}
async function importJSON() {
  const file = await openFile('.json');
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const state = JSON.parse(ev.target.result);
      if (!confirm('現在の設定を読み込んだデータで上書きしますか？')) return;
      if (state.method) document.getElementById('method').value = state.method;
      if (state.url) document.getElementById('url').value = state.url;
      if (state.bodyJson) document.getElementById('body-json-text').value = state.bodyJson;
      if (state.bodyMode) switchBodyTab(state.bodyMode);
      if (state.headers) {
        document.getElementById('headers-list').innerHTML = '';
        Object.entries(state.headers).forEach(([k, v]) => { const row = makeKVRow('headers-list','ヘッダー名','値'); row.querySelectorAll('input')[0].value=k; row.querySelectorAll('input')[1].value=v; });
      }
      if (state.query) {
        document.getElementById('query-list').innerHTML = '';
        Object.entries(state.query).forEach(([k, v]) => { const row = makeKVRow('query-list','パラメータ名','値'); row.querySelectorAll('input')[0].value=k; row.querySelectorAll('input')[1].value=v; });
      }
      if (state.history) { localStorage.setItem('api-history', JSON.stringify(state.history)); renderHistory(); }
    } catch(e) { alert('読み込みに失敗しました: ' + e.message); }
  };
  reader.readAsText(file);
}

addHeader();
addQuery();
renderHistory();
</script>
</body>
</html>
